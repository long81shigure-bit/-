<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WSSM Alliance Edition</title>
<style>
:root{
  --bg:#eef4fb;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#667085;
  --blue:#2f80ed;
  --green:#26a65b;
  --red:#ef4444;
  --yellow:#f59e0b;
  --line:#e5e7eb;
  --shadow:0 8px 22px rgba(31,41,55,.10);
}
*{box-sizing:border-box}
body{
  margin:0;
  padding:14px;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  background:linear-gradient(180deg,#dbeafe 0%,var(--bg) 220px);
  color:var(--text);
}
.wrap{max-width:760px;margin:0 auto 48px;}
h1{font-size:24px;text-align:center;margin:12px 0 4px;}
.sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:14px;}
.box,.station{
  background:var(--card);
  border-radius:18px;
  padding:14px;
  margin:12px 0;
  box-shadow:var(--shadow);
}
.statusBar{
  display:flex;
  gap:8px;
  align-items:center;
  justify-content:space-between;
  font-size:13px;
  color:var(--muted);
  flex-wrap:wrap;
}
.badge{
  display:inline-block;
  padding:4px 9px;
  border-radius:999px;
  background:#eef2ff;
  color:#344054;
  font-size:12px;
  font-weight:700;
}
.badge.ok{background:#dcfce7;color:#166534;}
.badge.warn{background:#fef3c7;color:#92400e;}
.todayItem{
  border-top:1px solid var(--line);
  padding:9px 0;
  display:flex;
  justify-content:space-between;
  gap:10px;
}
.station{border:2px solid transparent;}
.station.warn{border-color:var(--yellow);}
.station.danger{border-color:var(--red);background:#fff7f7;}
.head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  cursor:pointer;
}
.title{font-size:17px;font-weight:900;}
.summary{font-size:13px;color:var(--muted);text-align:right;}
.content{display:none;border-top:1px solid var(--line);margin-top:12px;padding-top:12px;}
.content.open{display:block;}
.info{
  display:grid;
  grid-template-columns:110px 1fr;
  gap:6px;
  font-size:14px;
  margin:6px 0;
}
.label{color:var(--muted);}
.value{font-weight:700;}
.help{font-size:12px;color:var(--muted);line-height:1.55;}
.small{font-size:12px;color:var(--muted);}
.notice{
  background:#fff7ed;
  color:#9a3412;
  border:1px solid #fed7aa;
  padding:10px;
  border-radius:12px;
  font-size:13px;
  line-height:1.55;
}
input,textarea{
  width:100%;
  border:1px solid #d0d5dd;
  border-radius:12px;
  padding:12px;
  font-size:16px;
  margin:7px 0;
  background:white;
}
textarea{min-height:76px;}
button{
  width:100%;
  border:0;
  border-radius:12px;
  padding:12px;
  margin:6px 0;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
}
.btnRow{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.primary{background:var(--blue);color:white;}
.green{background:var(--green);color:white;}
.red{background:var(--red);color:white;}
.gray{background:#667085;color:white;}
.light{background:#f2f4f7;color:#344054;}
.hidden{display:none;}
.loader{animation:pulse 1.2s infinite}
@keyframes pulse{0%{opacity:.35}50%{opacity:1}100%{opacity:.35}}
</style>
</head>
<body>
<div class="wrap">
  <h1>🏰 WSSM Alliance</h1>
  <div class="sub">Whiteout Survival Station Manager / Alliance Edition</div>

  <div class="box">
    <div class="statusBar">
      <span id="connectBadge" class="badge warn">未接続</span>
      <span id="userBadge">👤未設定</span>
      <span id="lastLoad">未読み込み</span>
    </div>
  </div>

  <div id="setupBox" class="box">
    <h3>⚙️初回設定</h3>
    <div class="help">
      自分の名前とApps ScriptのURL（最後が /exec のもの）を入れて保存してね。<br>
      これはこのスマホだけに保存されるよ。
    </div>
    <input id="userNameInput" placeholder="あなたの名前 例：あさこ">
    <textarea id="apiUrlInput" placeholder="Apps Script URL（https://script.google.com/macros/s/.../exec）"></textarea>
    <button class="primary" onclick="saveSettings()">💾設定を保存</button>
    <button class="light" onclick="testLoad()">🔌接続テスト</button>
  </div>

  <div class="box">
    <div class="btnRow">
      <button class="primary" onclick="loadData()">🔄再読み込み</button>
      <button class="gray" onclick="toggleSetup()">⚙️設定</button>
    </div>
    <div class="small">※他の人が更新した内容は「再読み込み」で反映されます。3分ごとにも自動更新します。</div>
  </div>

  <div class="box">
    <h3>🔥本日更新</h3>
    <div id="todayArea">読み込み待ちです</div>
  </div>

  <div id="message" class="notice hidden"></div>
  <div id="stationArea"></div>
</div>

<script>
const STATIONS=[
"建築ステ1","技術ステ1","採取ステ1","生産ステ1","訓練ステ2","武器ステ2",
"防御ステ2","遠征ステ3","建築ステ3","技術ステ3","武器ステ4","防御ステ4"
];

const ICONS={
"建築":"🏗️","技術":"🔬","採取":"⛏️","生産":"🏭","訓練":"🎖️","武器":"🗡️","防御":"🛡️","遠征":"🧭"
};

let apiUrl=localStorage.getItem("wssm_alliance_api")||"";
let userName=localStorage.getItem("wssm_alliance_user")||"";
let stations=STATIONS.map(name=>({station:name,capture:"",next:"",updated_at:"",updated_by:""}));
let openMap={};

document.getElementById("apiUrlInput").value=apiUrl;
document.getElementById("userNameInput").value=userName;
refreshBadges();

if(apiUrl){ loadData(); } else { render(); }

function icon(name){
  const key=Object.keys(ICONS).find(k=>name.includes(k));
  return key?ICONS[key]:"🏢";
}

function showMsg(text){
  const el=document.getElementById("message");
  el.textContent=text;
  el.classList.remove("hidden");
  setTimeout(()=>el.classList.add("hidden"),5500);
}

function refreshBadges(){
  document.getElementById("userBadge").textContent=userName?("👤"+userName):"👤未設定";
  document.getElementById("connectBadge").textContent=apiUrl?"URL設定済み":"未接続";
  document.getElementById("connectBadge").className=apiUrl?"badge ok":"badge warn";
}

function toggleSetup(){
  document.getElementById("setupBox").classList.toggle("hidden");
}

function saveSettings(){
  userName=document.getElementById("userNameInput").value.trim();
  apiUrl=document.getElementById("apiUrlInput").value.trim();

  if(!userName){ alert("名前を入力してね"); return; }
  if(!apiUrl || !apiUrl.endsWith("/exec")){ alert("Apps Script URLは /exec で終わるものを入れてね"); return; }

  localStorage.setItem("wssm_alliance_user",userName);
  localStorage.setItem("wssm_alliance_api",apiUrl);
  refreshBadges();
  showMsg("設定を保存しました。接続テストしてみてね！");
}

function parseDuration(text){
  text=(text||"").trim().replace(/\s+/g," ");
  if(!text) return null;

  let days=0;
  let time=text;

  if(/d/i.test(text)){
    const parts=text.split(/d/i);
    days=parseInt(parts[0],10)||0;
    time=(parts[1]||"").trim();
  }

  const nums=time.split(":").map(x=>parseInt(x,10));
  if(nums.length!==3 || nums.some(Number.isNaN)) return null;

  const [h,m,s]=nums;
  if(m<0 || m>59 || s<0 || s>59 || h<0) return null;

  return (((days*24+h)*60+m)*60+s)*1000;
}

function formatDate(v){
  if(!v) return "未設定";
  const d=new Date(v);
  if(isNaN(d)) return String(v);
  return d.toLocaleString("ja-JP",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
}

function formatTime(v){
  if(!v) return "";
  const d=new Date(v);
  if(isNaN(d)) return "";
  return d.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
}

function remain(v){
  if(!v) return "未設定";
  const d=new Date(v);
  const diff=d-new Date();
  if(isNaN(d)) return "未設定";
  if(diff<=0) return "🔴更新時間です";
  const days=Math.floor(diff/86400000);
  const hours=Math.floor((diff%86400000)/3600000);
  const mins=Math.floor((diff%3600000)/60000);
  return `${days}日 ${hours}時間 ${mins}分`;
}

function stateClass(st){
  if(!st.next) return "";
  const diff=new Date(st.next)-new Date();
  if(diff<=0) return "danger";
  if(diff<=86400000) return "warn";
  return "";
}

function sortStations(arr){
  return [...arr].sort((a,b)=>{
    if(!a.next && !b.next) return STATIONS.indexOf(a.station)-STATIONS.indexOf(b.station);
    if(!a.next) return 1;
    if(!b.next) return -1;
    return new Date(a.next)-new Date(b.next);
  });
}

function renderToday(){
  const area=document.getElementById("todayArea");
  const now=new Date();
  const today=stations.filter(st=>{
    if(!st.next) return false;
    const d=new Date(st.next);
    return d.getFullYear()===now.getFullYear() &&
           d.getMonth()===now.getMonth() &&
           d.getDate()===now.getDate();
  }).sort((a,b)=>new Date(a.next)-new Date(b.next));

  if(today.length===0){
    area.innerHTML="今日はありません🥳";
    return;
  }

  area.innerHTML=today.map(st=>`
    <div class="todayItem">
      <div><b>${icon(st.station)}${st.station}</b><br><span class="small">👤${st.updated_by||"不明"}</span></div>
      <div style="text-align:right"><b>${formatTime(st.next)}</b><br><span class="small">${remain(st.next)}</span></div>
    </div>
  `).join("");
}

function render(){
  renderToday();
  const area=document.getElementById("stationArea");
  const sorted=sortStations(stations);

  area.innerHTML=sorted.map(st=>{
    const idx=STATIONS.indexOf(st.station);
    const isOpen=openMap[st.station] ? "open" : "";
    const cls=stateClass(st);
    return `
      <div class="station ${cls}">
        <div class="head" onclick="toggleOpen('${st.station}')">
          <div class="title">${icon(st.station)}${st.station}</div>
          <div class="summary">
            ${st.next ? formatDate(st.next) : "未設定"}<br>
            <span class="small">${st.next ? remain(st.next) : "タップして登録"}</span>
          </div>
        </div>

        <div id="content_${idx}" class="content ${isOpen}">
          <div class="info"><div class="label">⏰占領可能</div><div class="value">${formatDate(st.capture)}</div></div>
          <div class="info"><div class="label">📅次回更新</div><div class="value">${formatDate(st.next)}</div></div>
          <div class="info"><div class="label">⌛残り</div><div class="value">${remain(st.next)}</div></div>
          <div class="info"><div class="label">👤更新者</div><div class="value">${st.updated_by||"未記録"}</div></div>
          <div class="info"><div class="label">🕒更新日時</div><div class="value">${formatDate(st.updated_at)}</div></div>

          <input id="duration_${idx}" placeholder="例：22:57:46 または 1d 19:45:42">
          <button class="green" onclick="registerByDuration(${idx})">🧮残り時間から登録</button>
          <button class="primary" onclick="markUpdated(${idx})">🔄更新完了（次回更新 +3日）</button>
        </div>
      </div>
    `;
  }).join("");
}

function toggleOpen(name){
  openMap[name]=!openMap[name];
  render();
}

async function testLoad(){
  await loadData(true);
}

function normalizeRows(rows){
  if(!Array.isArray(rows) || rows.length<2) return STATIONS.map(name=>({station:name,capture:"",next:"",updated_at:"",updated_by:""}));
  const header=rows[0].map(x=>String(x).trim());
  const index=(key)=>header.indexOf(key);
  const result=STATIONS.map(name=>({station:name,capture:"",next:"",updated_at:"",updated_by:""}));

  for(let i=1;i<rows.length;i++){
    const row=rows[i];
    const name=row[index("station")];
    const found=result.find(x=>x.station===name);
    if(found){
      found.capture=row[index("capture")]||"";
      found.next=row[index("next")]||"";
      found.updated_at=row[index("updated_at")]||"";
      found.updated_by=row[index("updated_by")]||"";
    }
  }
  return result;
}

async function loadData(isTest=false){
  if(!apiUrl){ showMsg("先にApps Script URLを設定してね"); return; }
  document.getElementById("lastLoad").textContent="読み込み中…";
  document.getElementById("lastLoad").className="loader";

  try{
    const res=await fetch(apiUrl + "?t=" + Date.now());
    const rows=await res.json();
    stations=normalizeRows(rows);
    document.getElementById("lastLoad").className="";
    document.getElementById("lastLoad").textContent="最終読込 "+new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
    if(isTest) showMsg("接続成功！共有データを読み込めました。");
    render();
  }catch(err){
    document.getElementById("lastLoad").className="";
    document.getElementById("lastLoad").textContent="読込失敗";
    showMsg("読み込みに失敗しました。Apps Script URL、公開範囲、または通信制限を確認してね。");
    console.error(err);
  }
}

async function postUpdate(payload){
  if(!apiUrl){ showMsg("先にApps Script URLを設定してね"); return false; }
  if(!userName){ showMsg("先に名前を設定してね"); return false; }

  try{
    await fetch(apiUrl,{
      method:"POST",
      mode:"no-cors",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(payload)
    });
    showMsg("更新を送信しました。数秒後に再読み込みします。");
    setTimeout(loadData,1600);
    return true;
  }catch(err){
    showMsg("送信に失敗しました。通信状態を確認してね。");
    console.error(err);
    return false;
  }
}

function registerByDuration(idx){
  const station=STATIONS[idx];
  const input=document.getElementById("duration_"+idx);
  const ms=parseDuration(input.value);
  if(ms===null){
    alert("22:57:46 または 1d 19:45:42 の形で入力してね");
    return;
  }

  const capture=new Date(Date.now()+ms);
  const next=new Date(capture);
  next.setDate(next.getDate()+3);

  postUpdate({
    station,
    capture:capture.toISOString(),
    next:next.toISOString(),
    updated_at:new Date().toISOString(),
    updated_by:userName
  });
}

function markUpdated(idx){
  const station=STATIONS[idx];
  const st=stations.find(x=>x.station===station);
  if(!st || !st.next){
    alert("まだ次回更新が未設定です。先に残り時間から登録してね。");
    return;
  }

  const capture=new Date(st.next);
  const next=new Date(st.next);
  next.setDate(next.getDate()+3);

  postUpdate({
    station,
    capture:capture.toISOString(),
    next:next.toISOString(),
    updated_at:new Date().toISOString(),
    updated_by:userName
  });
}

setInterval(()=>render(),60000);
setInterval(()=>{ if(apiUrl) loadData(); },180000);
</script>
</body>
</html>
